<html>
    <body>
        <style>
            input[type=text]{
                width:100%;
                border:2px ;
                background-color:red;  
                padding: 15px;  
                margin: 10px;  
                font-size: 20px;          
            }
            input[type=number]{
                width:100%;
                border:2px ;
                background-color:blueviolet;  
                padding: 15px;  
                margin: 10px;  
                font-size: 20px;          
            }
            input[type=button]{
                border:2px ;
                background-color:green;  
                padding: 15px;  
                margin: 10px;  
                font-size: 20px;          
            }
            h3{
                text-align:center;
                color: red;
            }
        </style>
        <h3>SBI EMI CALCULATOR</h3>
        <form>
            Name <input type="text" placeholder="enter you name">
            Occupation<input type="text" placeholder="enter you occupation">
            Loan Amount<input type="number" id="amount" placeholder="enter loan amount">
            Intrest Rate<input type="number" id="ir" placeholder="enter intrest rate">
            Tenure in years<input type="number" id="tiy" placeholder="enter tenure in years">
            <input type="button" value="Calcuate EMI" onclick="calculate()">
        </form>
        <p id="result"></p>
        <script>
            function calculate()
            {
            var A=Number(document.getElementById("amount").value);
            var intrest=Number(document.getElementById("ir").value);
            var tenure=Number(document.getElementById("tiy").value);
            var mir=(intrest/12)*100;
            var emi=(A*mir*Math.pow(1+mir,tenure))/(Math.pow(1+mir,tenure)-1);
            //document.write("your EMI is"+emi);
            document.getElementById("result").innerHTML="<h2>Your EMI is</h2>"+emi.toFixed(2);
            }
        </script>
