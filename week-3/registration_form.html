<html>
    <body bgcolor="lightblue" align="center">
        <h1>Registration Form</h1>
        <form action="success.html" >
            <table  align="center">
                <tr>
                    <td>Name:</td>
                    <td><input type="text" placeholder="Enter your name"></td>
                </tr>
                    <td>Gender:</td>
                    <td>
                        <input type="radio" name="gender" value="male">
                        <label>Male</label><br>
                        <input type="radio" name="gender" value="female">
                        <label>Female</label><br>
                        <input type="radio" name="gender" value="other">
                        <label>Other</label>
                    </td>
                </tr>

                <tr>
                    <td>Email:</td>
                    <td><input type="email" placeholder="Enter your email"></td>
                </tr>
                <tr>
                    <td>Language known :</td>
                    <td><input type="checkbox" name="languages" value="english">
                        <label>English</label><br>
                        <input type="checkbox" name="languages" value="Telugu">
                        <label>Telugu</label><br>
                        <input type="checkbox" name="languages" value="Hindi">
                        <label>Hindi</label>
                    </td>
                </tr>
                
                <tr>
                    <td>Contact Number:</td>
                    <td><input type="number" placeholder="Enter your contact number"></td>
                </tr>
                
                <tr>
                    <td>Address:</td>
                    <td><textarea rows="5" cols="15" placeholder="Enter your address"></textarea></td>
                </tr>
                
                <tr>
                    <td>Job location:</td>
                    <td><select>
                        <option value="select">Select a city</option>
                        <option value="Hyderabad">Hyderabad</option>
                        <option value="Bangalore">Bangalore</option>
                        <option value="Chennai">Chennai</option>
                        <option value="Delhi">Delhi</option>
                    
                    </td>
                </tr>
                
                <tr>
                    <td>Description:</td>
                    <td><textarea rows="5" cols="15" placeholder="Tell us about yourself"></textarea></td>
                </tr>
                
                <tr>
                    <td>Upload your CV:</td>
                    <td><input type="file"></td>
                </tr>
                <tr>
                    <td>  <td></td>
                </tr>    
            
            </table><br>
            <input type="submit" value="Submit" align="center">
             <input type="reset" value="Reset" align="center">     
        </form>
    </body>

</html>
